spring.security.oauth2.client.registration.securelms-local.redirect-uri={baseUrl}/api/auth/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.securelms-local.authorization-uri=${app.oauth2.auth-server.issuer}/oauth2/authorize
spring.security.oauth2.client.provider.securelms-local.token-uri=${app.oauth2.auth-server.issuer}/oauth2/token
spring.security.oauth2.client.provider.securelms-local.jwk-set-uri=${app.oauth2.auth-server.issuer}/oauth2/jwks
spring.security.oauth2.client.provider.securelms-local.user-info-uri=${app.oauth2.auth-server.issuer}/userinfo

